<!DOCTYPE html>
<html>
<head>
<title>Profile</title>

<style>
body {
    background: #0f2027;
    color: white;
    text-align: center;
    font-family: Arial;
}

/* 👤 PROFILE BOX */
.profile-box {
    margin-top: 50px;
}

/* 🎭 AVATAR FIXED */
.avatar {
    width: 120px;
    height: 120px;
    margin: 0 auto;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 80px;

    border-radius: 50%;
    border: 3px solid #00c6ff;

    line-height: 1;
    box-shadow: 0 0 15px #00c6ff;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.1);
    margin: 20px;
    padding: 20px;
    border-radius: 15px;
}

/* SHOP */
.char-shop {
    display: none;
    margin-top: 20px;
}

/* BUTTON */
button {
    padding: 8px 15px;
    border-radius: 10px;
    border: none;
    background: #00c6ff;
    color: black;
    cursor: pointer;
    margin-top: 10px;
}
</style>
</head>

<body>

<!-- 👤 PROFILE -->
<div class="profile-box">

    <div class="avatar">
        {{ selected }}
    </div>

    <h2>{{name}}</h2>
    <p>🎯 Level {{level}}</p>
    <p>💰 {{coins}} Coins</p>

    <button onclick="toggleShop()">🎭 Characters</button>

</div>

<!-- 🎭 CHARACTER SHOP -->
<div id="charShop" class="char-shop">

    {% for c in characters %}
    <div class="card">

        <h1 style="font-size:60px;">{{c.emoji}}</h1>

        {% if c.emoji in owned %}
            <p>✅ Owned</p>

            {% if c.emoji == selected %}
                <p>🟢 Selected</p>
            {% else %}
                <a href="/select_char/{{c.emoji}}">
                    <button>Use</button>
                </a>
            {% endif %}

        {% else %}
            <p>{{c.cost}} coins</p>

            <!-- 🔥 FIXED BUY BUTTON -->
            <button onclick="buyChar('{{c.emoji}}', {{c.cost}})">
                Buy
            </button>

        {% endif %}

    </div>
    {% endfor %}

</div>

<!-- 🔙 BACK -->
<br>
<a href="/home"><button>Back</button></a>

<script>
function toggleShop(){
    let shop = document.getElementById("charShop");
    shop.style.display = (shop.style.display === "block") ? "none" : "block";
}

/* 🔥 BUY SYSTEM FIXED */
function buyChar(emoji, cost){

    fetch("/buy_char", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: `emoji=${encodeURIComponent(emoji)}&cost=${cost}`
    })
    .then(res => res.text())
    .then(msg => {
        alert(msg);
        location.reload();
    })
    .catch(err => {
        alert("❌ Error buying character");
        console.log(err);
    });
}
</script>

</body>
</html>
