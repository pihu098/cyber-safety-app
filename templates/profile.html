<!DOCTYPE html>
<html>
<head>
<title>Profile</title>

<style>
body {
    background: #0f2027;
    color: white;
    text-align: center;
    font-family: Arial;
}

/* 👤 PROFILE BOX */
.profile-box {
    margin-top: 50px;
}

/* 🎭 AVATAR */
.avatar {
    width: 120px;
    height: 120px;
    margin: 0 auto;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 80px;

    border-radius: 50%;
    border: 3px solid #00c6ff;

    line-height: 1;
    box-shadow: 0 0 15px #00c6ff;
}

/* INFO BOX */
.info-box {
    background: rgba(0,198,255,0.15);
    border: 2px solid #00c6ff;
    width: 240px;
    margin: 15px auto;
    padding: 12px;
    border-radius: 15px;
    box-shadow: 0 0 15px #00c6ff;
    font-size: 22px;
    font-weight: bold;
    color: #00e5ff;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.1);
    margin: 20px auto;
    padding: 20px;
    border-radius: 15px;
    width: 80%;
}

/* SHOP */
.char-shop {
    display: none;
    margin-top: 20px;
}

/* BUTTON */
button {
    padding: 8px 15px;
    border-radius: 10px;
    border: none;
    background: #00c6ff;
    color: black;
    cursor: pointer;
    margin-top: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<!-- 👤 PROFILE -->
<div class="profile-box">

    <!-- AVATAR -->
    <div class="avatar">
        {{ selected }}
    </div>

    <!-- NAME -->
    <div class="info-box">
        👤 {{name}}
    </div>

    <!-- LEVEL -->
    <div class="info-box">
        🎯 Level {{level}}
    </div>

    <!-- COINS -->
    <div class="info-box">
        💰 {{coins}} Coins
    </div>

    <!-- XP -->
    <div class="info-box">
        ⭐ XP: {{ xp }}
    </div>

    <button onclick="toggleShop()">🎭 Characters</button>

</div>

<!-- 🎭 CHARACTER SHOP -->
<div id="charShop" class="char-shop">

    {% for c in characters %}
    <div class="card">

        <h1 style="font-size:60px;">{{c.emoji}}</h1>

        {% if c.emoji in owned %}

            <p>✅ Owned</p>

            {% if c.emoji == selected %}

                <p>🟢 Selected</p>

            {% else %}

                <a href="/use_char/{{c.emoji}}">
                    <button>Use</button>
                </a>

            {% endif %}

        {% else %}

            <p>{{c.cost}} coins</p>

            <button onclick="buyChar('{{c.emoji}}', {{c.cost}})">
                Buy
            </button>

        {% endif %}

    </div>
    {% endfor %}

</div>

<!-- 🔙 BACK -->
<br>

<a href="/home">
    <button>⬅ Back</button>
</a>

<script>

function toggleShop(){

    let shop = document.getElementById("charShop");

    shop.style.display =
        (shop.style.display === "block")
        ? "none"
        : "block";
}

/* 🔥 BUY SYSTEM */

function buyChar(emoji, cost){

    fetch("/buy_char", {

        method: "POST",

        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },

        body:
            `emoji=${encodeURIComponent(emoji)}&cost=${cost}`
    })

    .then(res => res.text())

    .then(msg => {

        alert(msg);

        location.reload();
    })

    .catch(err => {

        alert("❌ Error buying character");

        console.log(err);
    });
}

</script>
    
<audio id="bgMusic" loop>
    <source src="/static/sounds/password.mp3" type="audio/mp3">
</audio>

<script>

document.addEventListener("click", function () {

    let music = document.getElementById("bgMusic");

    if (music) {

        music.volume = 0.12;

        music.play().catch(()=>{});

    }

}, { once: true });

</script>    

    
</body>
</html>
