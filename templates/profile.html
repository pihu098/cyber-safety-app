<!DOCTYPE html>
<html>
<head>
<title>Profile</title>

<style>
body {
    background: #0f2027;
    color: white;
    text-align: center;
    font-family: Arial;
}

.profile-box {
    margin-top: 50px;
}

.profile-img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid #00c6ff;
}

.card {
    background: rgba(255,255,255,0.1);
    margin: 20px;
    padding: 20px;
    border-radius: 15px;
}
</style>
</head>

<body>
<div class="profile-box">

    <!-- 👤 PROFILE -->
    <div class="profile-main">
        <div class="avatar">
            {{ owned[0] }} <!-- selected character -->
        </div>

        <h2>{{name}}</h2>
        <p class="level">Level {{level}}</p>
        <p class="coins">💰 {{coins}} Coins</p>
    </div>

    <!-- 🎭 CHARACTER BUTTON -->
    <button class="char-btn" onclick="toggleShop()">
        🎭 Characters
    </button>

</div>
<div class="profile-box">

    <img src="/static/characters/bot.gif" class="profile-img">

    <h2>{{name}}</h2>

</div>

<div class="card">
    <h3>🎯 Level</h3>
    <p>{{level}}</p>
</div>
<h2>👤 {{name}}'s Profile</h2>
<p>💰 Coins: {{coins}}</p>

<div class="grid">

{% for c in characters %}

<div class="card">

<h1>{{c.emoji}}</h1>

{% if c.emoji in owned %}
    <p>✅ Owned</p>
    <a href="#" onclick="selectChar('{{c.emoji}}')">Use</a>

{% else %}
    <p>{{c.cost}} coins</p>
    <a href="/buy_char/{{c.emoji}}">Buy</a>
{% endif %}

</div>

{% endfor %}

</div>

<script>
function selectChar(emoji){
    localStorage.setItem("character", emoji);
    alert("Selected ✅");
}
</script>
<div class="card">
    <h3>📊 Stats</h3>
    <p>{{stats}}</p>
</div>



<a href="/home"><button>Back</button></a>

</body>
</html>
