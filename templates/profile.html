<!DOCTYPE html>
<html>
<head>
<title>Profile</title>

<style>
body {
    background: #0f2027;
    color: white;
    text-align: center;
    font-family: Arial;
}

.profile-box {
    margin-top: 50px;
}

.avatar {
    font-size: 70px;
}

.card {
    background: rgba(255,255,255,0.1);
    margin: 20px;
    padding: 20px;
    border-radius: 15px;
}

.char-shop {
    display: none;
}

button {
    padding: 8px 15px;
    border-radius: 10px;
    border: none;
    background: #00c6ff;
    color: black;
    cursor: pointer;
    margin-top: 10px;
}
</style>
</head>

<body>

<!-- 👤 PROFILE -->
<div class="profile-box">

    <div class="avatar">
        {{ selected }}
    </div>

    <h2>{{name}}</h2>
    <p>🎯 Level {{level}}</p>
    <p>💰 {{coins}} Coins</p>

    <button onclick="toggleShop()">🎭 Characters</button>

</div>



<!-- 🎭 CHARACTER SHOP -->
<div id="charShop" class="char-shop">

    {% for c in characters %}
    <div class="card">

        <h1>{{c.emoji}}</h1>

        {% if c.emoji in owned %}
            <p>✅ Owned</p>

            {% if c.emoji == selected %}
                <p>🟢 Selected</p>
            {% else %}
                <a href="/select_char/{{c.emoji}}">
                    <button>Use</button>
                </a>
            {% endif %}

        {% else %}
            <p>{{c.cost}} coins</p>
            <a href="/buy_char/{{c.emoji}}">
                <button>Buy</button>
            </a>
        {% endif %}

    </div>
    {% endfor %}

</div>

<!-- 🔙 BACK -->
<a href="/home"><button>Back</button></a>

<script>
function toggleShop(){
    let shop = document.getElementById("charShop");
    shop.style.display = (shop.style.display=="block") ? "none" : "block";
}
</script>

</body>
</html>
