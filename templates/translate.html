<!DOCTYPE html>
<html>
<head>
<title>Translator</title>

<style>
body{
    background:#0f2027;
    color:white;
    text-align:center;
    font-family:Arial;
}

textarea{
    width:80%;
    height:100px;
    border-radius:10px;
    padding:10px;
}

select, button{
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

.result{
    margin-top:20px;
    background:rgba(255,255,255,0.1);
    padding:15px;
    border-radius:10px;
}
</style>

</head>

<body>

<h2>🌐 Translate Text</h2>

<form method="POST">

    <textarea name="text" placeholder="Enter text..."></textarea><br>

    <select name="lang">
        <option value="en">English</option>
        <option value="hi">Hindi</option>
        <option value="fr">French</option>
        <option value="es">Spanish</option>
    </select><br>

    <button type="submit">Translate</button>

</form>

{% if result %}
<div class="result">
    <h3>Result:</h3>
    <p>{{ result }}</p>
</div>
{% endif %}

<br>
<a href="/home"><button>Back</button></a>

</body>
</html>
