<!DOCTYPE html>
<html>
<head>
    <title>File Scanner</title>
</head>
<body style="font-family:Arial; background:#0f2027; color:white; text-align:center;">

<h2>📁 File Safety Scanner</h2>

<form method="POST" action="/scan_file" enctype="multipart/form-data">
    <input type="file" name="file">
    <br><br>
    <button type="submit">Scan File</button>
</form>

<form action="/scan_file" method="POST" enctype="multipart/form-data">

    <input type="file" name="file" id="fileInput" hidden>

    <button type="button" onclick="document.getElementById('fileInput').click()">
        📁 Select File
    </button>

    <button type="submit">Scan File</button>

</form>
    
    
</body>
</html>
