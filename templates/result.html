<!DOCTYPE html>
<html>
<head>
<title>Result</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(-45deg, #141e30, #243b55, #000000);
    background-size: 400% 400%;
    animation: gradient 10s ease infinite;
    color: white;
    text-align: center;
}

@keyframes gradient {
    0% {background-position: 0%}
    50% {background-position: 100%}
    100% {background-position: 0%}
}

.container {
    margin-top: 100px;
    background: rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 15px;
    display: inline-block;
    backdrop-filter: blur(10px);
    width: 320px;
    box-shadow: 0 0 20px rgba(0,255,255,0.3);
}

h2 {
    margin-bottom: 10px;
    color: #00ffd5;
}

.icon {
    font-size: 40px;
    margin-bottom: 10px;
}

p {
    font-size: 15px;
    color: #ddd;
    margin-bottom: 20px;
}

button {
    padding: 10px 20px;
    margin: 8px;
    border-radius: 8px;
    border: none;
    background: #00c6ff;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
    background: #0072ff;
}
</style>
</head>

<body>

<div class="container">

<div class="icon">🎉</div>

<h2>{{ result }}</h2>
<p>{{ extra }}</p>

<button onclick="window.location.href='/home'">
    ⬅ Back to Dashboard
</button>

<button onclick="window.location.href='/'">
    🏠 Go to Login
</button>

</div>

</body>
</html>
