<!DOCTYPE html>
<html>

<head>
    <title>Cyber AI</title>
</head>

<body style="background:black;color:white;font-family:Arial;text-align:center;">

<h1 style="color:cyan;">🤖 NEW CYBER AI PAGE</h1>

<input type="text" id="userInput" placeholder="Ask anything..." />

<button type="button" onclick="sendMessage()">
    Send
</button>

<div id="chat"></div>

<script>
async function sendMessage(){

    let message = document.getElementById("userInput").value.trim();

    if(!message) return;

    let response = await fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: message
        })
    });

    let data = await response.json();

    document.getElementById("chat").innerHTML += `
        <p><b>You:</b> ${message}</p>
        <p><b>AI:</b> ${data.reply}</p>
    `;
}
</script>
</body>
</html>
