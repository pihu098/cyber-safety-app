<!DOCTYPE html>
<html>

<head>
    <title>AI Chat</title>

    <style>
        body{
            background:#0f0f0f;
            color:white;
            font-family:Arial;
            text-align:center;
        }

        #chat{
            width:80%;
            margin:auto;
            margin-top:20px;
            text-align:left;
        }

        .msg{
            padding:10px;
            margin:8px;
            border-radius:10px;
        }

        .user{
            background:#1e90ff;
        }

        .ai{
            background:#333;
        }

        input{
            width:60%;
            padding:10px;
        }

        button{
            padding:10px 15px;
            cursor:pointer;
        }
    </style>

</head>

<body>

<h1>🤖 My AI Chatbot</h1>

<input id="userInput" placeholder="Ask anything..." />
<button onclick="sendMessage()">Send</button>

<div id="chat"></div>

<script>

async function sendMessage(){

    let input = document.getElementById("userInput");
    let message = input.value.trim();

    if(!message) return;

    // show user message instantly
    document.getElementById("chat").innerHTML += `
        <div class="msg user">You: ${message}</div>
    `;

    input.value = "";

    try {

        let res = await fetch("/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message })
        });

        let data = await res.json();

        // show AI reply
        document.getElementById("chat").innerHTML += `
            <div class="msg ai">AI: ${data.reply}</div>
        `;

    } catch(err){
        console.log(err);
    }
}

</script>

</body>
</html>
