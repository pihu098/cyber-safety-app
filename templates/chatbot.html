<!DOCTYPE html>
<html>

<head>
    <title>Cyber AI</title>
</head>

<body style="background:black;color:white;font-family:Arial;text-align:center;">

<h1 style="color:cyan;">🤖 Cyber AI Chat</h1>

<input type="text" id="userInput" placeholder="Ask anything..." />

<button type="button" onclick="sendMessage()">Send</button>

<div id="chat"></div>

<script>

async function sendMessage(){

    let inputBox = document.getElementById("userInput");
    let message = inputBox.value.trim();

    if(!message) return;

    try {

        let response = await fetch("/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: message
            })
        });

        let data = await response.json();

        document.getElementById("chat").innerHTML += `
            <p><b>You:</b> ${message}</p>
            <p><b>AI:</b> ${data.reply}</p>
        `;

        inputBox.value = "";

    } catch(error){
        console.log(error);
        alert("ERROR OCCURRED");
    }
}

</script>

</body>
</html>
