<!DOCTYPE html>
<html>
<head>
    <title>Cyber AI Chatbot</title>

    <style>
        body{
            background:#0f172a;
            color:white;
            font-family:Arial;
            text-align:center;
        }

        #chat-box{
            width:80%;
            height:400px;
            border:1px solid white;
            margin:auto;
            overflow-y:auto;
            padding:10px;
            background:#111827;
            border-radius:10px;
        }

        input{
            width:70%;
            padding:10px;
            border-radius:10px;
            border:none;
        }

        button{
            padding:10px 20px;
            border:none;
            border-radius:10px;
            background:cyan;
            cursor:pointer;
        }

        .user{
            color:cyan;
            margin:10px;
        }

        .bot{
            color:lime;
            margin:10px;
        }
    </style>
</head>

<body>

<h1>🤖 Cyber AI Assistant</h1>

<div id="chat-box"></div>

<br>

<input type="text" id="userInput" placeholder="Ask anything...">

<button onclick="sendMessage()">Send</button>

<script>
async function sendMessage(){

    let input = document.getElementById("userInput");

    let message = input.value;

    if(message.trim() == "") return;

    let chatBox = document.getElementById("chat-box");

    chatBox.innerHTML += `
        <div class="user">
            👤 ${message}
        </div>
    `;

    input.value = "";

    let response = await fetch("/chat", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            message: message
        })
    });

    let data = await response.json();

    chatBox.innerHTML += `
        <div class="bot">
            🤖 ${data.reply}
        </div>
    `;

    chatBox.scrollTop = chatBox.scrollHeight;
}
</script>

</body>
</html>
