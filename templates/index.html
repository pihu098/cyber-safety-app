<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(-45deg, #141e30, #243b55, #000000);
    background-size: 400% 400%;
    animation: gradient 10s ease infinite;
    color: white;
    text-align: center;
}

@keyframes gradient {
    0% {background-position: 0%}
    50% {background-position: 100%}
    100% {background-position: 0%}
}

.container {
    margin-top: 100px;
    background: rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 15px;
    display: inline-block;
    backdrop-filter: blur(10px);
}

input {
    padding: 10px;
    margin: 10px;
    border-radius: 8px;
    border: none;
    width: 80%;
}

button {
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    background: #00c6ff;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
    background: #0072ff;
}

a {
    color: #00c6ff;
    text-decoration: none;
}
</style>

</head>

<body>

<div class="container">

<h2>🔐 Cyber Safety Login</h2>

<!-- 🔥 LOGIN FORM -->
<form method="POST" action="/login" onsubmit="return handleLogin()">

<input type="email" name="email" placeholder="Email" required><br>

<input type="password" name="password" placeholder="Password" required><br>

<button type="submit">Login</button>

</form>

<p>Don't have an account?</p>

<a href="/signup">
<button type="button">Signup</button>
</a>

</div>

<!-- 🔊 SOUND -->
<audio id="bgMusic" loop>
    <source src="/static/sounds/ribhavagrawal-a-savage-hackerbass-boosted-199368.mp3" type="audio/mpeg">
</audio>

<script>

// 🔐 LOGIN SOUND
function handleLogin(){

    let music = document.getElementById("bgMusic");

    music.volume = 0.2;

    music.play();

    // ⏳ delay before login
    setTimeout(() => {

        document.querySelector("form").submit();

    }, 800);

    return false;
}


// 🎵 DASHBOARD MUSIC BUTTON
function startMusic(){

    let music = document.getElementById("bgMusic");

    music.volume = 0.05;

    music.play();

}

</script>


<!-- 🎵 MUSIC BUTTON -->
<button onclick="startMusic()" 
style="
position:fixed;
bottom:20px;
right:20px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#00c6ff;
color:white;
cursor:pointer;
z-index:999;
">


<!-- 📊 Result Box -->
<div id="resultBox"></div>

</body>

</html>
