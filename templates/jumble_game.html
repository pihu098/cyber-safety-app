<!DOCTYPE html>
<html>
<head>
<title>Word Jumble</title>

<style>

body{
background:#1f1f1f;
font-family:Arial;
text-align:center;
color:white;
}

.top{
display:flex;
justify-content:space-around;
margin:15px;
font-size:20px;
}

.grid{
display:inline-block;
margin-top:20px;
}

.row{
display:flex;
}

.cell{
width:55px;
height:55px;
background:#5a3419;
margin:3px;
line-height:55px;
font-size:30px;
font-weight:bold;
border-radius:8px;
cursor:pointer;
}

#answer{
margin-top:20px;
font-size:28px;
letter-spacing:10px;
min-height:40px;
}

input{
padding:12px;
width:220px;
font-size:20px;
border-radius:10px;
border:none;
margin-top:15px;
}

button{
padding:12px 20px;
font-size:18px;
border:none;
border-radius:10px;
margin:10px;
cursor:pointer;
background:orange;
color:white;
}

.found{
margin-top:20px;
font-size:22px;
color:lime;
}

.win{
font-size:40px;
color:gold;
animation: pop 1s infinite;
}

@keyframes pop{
50%{
transform:scale(1.2);
}
}

</style>

</head>
<body>

<div class="top">
<div>❤️ Lives: {{ lives }}</div>
<div>🪙 Coins: <span id="coins">{{ coins }}</span></div>
<div>📘 Words: <span id="count">{{ found|length }}</span>/{{ total_words }}</div>
</div>

<div class="grid">

{% for row in grid %}
<div class="row">

{% for letter in row %}
<div class="cell" onclick="pick('{{ letter }}')">
{{ letter }}
</div>
{% endfor %}

</div>
{% endfor %}

</div>

<div id="answer"></div>

<input type="text" id="wordInput" placeholder="Type word">

<br>

<button onclick="submitWord()">Submit</button>

<button onclick="clearWord()">Clear</button>

<button onclick="getHint()">Hint (-5)</button>

<div class="found" id="foundWords"></div>

<h2 id="result"></h2>

<script>

let currentWord = "";

function pick(letter){

currentWord += letter;

document.getElementById("answer").innerHTML = currentWord;

document.getElementById("wordInput").value = currentWord;
}

function clearWord(){

currentWord = "";

document.getElementById("answer").innerHTML = "";
document.getElementById("wordInput").value = "";
}

function submitWord(){

let word = document.getElementById("wordInput").value;

fetch("/jumble/check",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
answer:word
})
})

.then(r=>r.json())

.then(data=>{

if(data.result=="correct"){

document.getElementById("foundWords").innerHTML += "✅ " + word + "<br>";

document.getElementById("count").innerHTML = data.found.length;

document.getElementById("coins").innerHTML = data.coins;

clearWord();
}

else if(data.result=="win"){

document.getElementById("result").innerHTML =
"<div class='win'>🎉 YOU WON 🎉</div><br><button onclick='nextLevel()'>CHAPTER NEXT ➜</button>";
}

else if(data.result=="wrong"){

alert("❌ Wrong Word");

location.reload();
}

else if(data.result=="gameover"){

alert("💀 Better Luck Next Time");

window.location="/jumble/restart";
}

})

}

function getHint(){

fetch("/jumble/hint")

.then(r=>r.json())

.then(data=>{

if(data.hint){

alert("💡 Hint: " + data.hint);

document.getElementById("coins").innerHTML = data.coins;
}

else{

alert(data.error);
}

})

}

function nextLevel(){

window.location="/jumble";
}

</script>

<audio id="correctSound">
    <source src="{{ url_for('static', filename='sounds/correct.mp3') }}" type="audio/mpeg">
</audio>

<audio id="wrongSound">
    <source src="{{ url_for('static', filename='sounds/wrong.mp3') }}" type="audio/mpeg">
</audio>

<audio id="loseSound">
    <source src="{{ url_for('static', filename='sounds/lose.mp3') }}" type="audio/mpeg">
</audio>

<audio id="hintSound">
    <source src="{{ url_for('static', filename='sounds/hint.mp3') }}" type="audio/mpeg">
</audio>
  
</body>
</html>
