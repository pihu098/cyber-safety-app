<!DOCTYPE html>
<html>
<head>
<title>Word Jumble</title>

<style>

body{
background:#1f1f1f;
font-family:Arial;
text-align:center;
color:white;
}

.top{
display:flex;
justify-content:space-around;
margin:15px;
font-size:20px;
}

.grid{
display:inline-block;
margin-top:20px;
}

.row{
display:flex;
}

.cell{
width:55px;
height:55px;
background:#5a3419;
margin:3px;
line-height:55px;
font-size:30px;
font-weight:bold;
border-radius:8px;
cursor:pointer;
}

#answer{
margin-top:20px;
font-size:28px;
letter-spacing:10px;
min-height:40px;
}

input{
padding:12px;
width:220px;
font-size:20px;
border-radius:10px;
border:none;
margin-top:15px;
}

button{
padding:12px 20px;
font-size:18px;
border:none;
border-radius:10px;
margin:10px;
cursor:pointer;
background:orange;
color:white;
}

.found{
margin-top:20px;
font-size:22px;
color:lime;
}

.win{
font-size:40px;
color:gold;
animation: pop 1s infinite;
}

@keyframes pop{
50%{
transform:scale(1.2);
}
}

</style>

</head>
<body>

<div class="top">
<div>❤️ Lives: {{ lives }}</div>
<div>🪙 Coins: <span id="coins">{{ coins }}</span></div>
<div>📘 Words: <span id="count">{{ found|length }}</span>/{{ total_words }}</div>
</div>

<div class="grid">

{% for row in grid %}
<div class="row">

{% for letter in row %}
<div class="cell" onclick="pick('{{ letter }}')">
{{ letter }}
</div>
{% endfor %}

</div>
{% endfor %}

</div>

<div id="answer"></div>

<input type="text" id="wordInput" placeholder="Type word">

<br>

<div style="margin-top:20px;">

<button id="submitBtn">
Submit
</button>

<button id="clearBtn">
Clear
</button>

<button id="hintBtn">
Hint (-5)
</button>

</div>

<div class="found" id="foundWords"></div>

<h2 id="result"></h2>

<audio id="correctSound">
    <source src="{{ url_for('static', filename='sounds/correct sound.wav') }}" type="audio/wav">
</audio>

<audio id="wrongSound">
    <source src="{{ url_for('static', filename='sounds/wrong sound.mp3') }}" type="audio/mpeg">
</audio>

<audio id="loseSound">
    <source src="{{ url_for('static', filename='sounds/lose sound.mp3') }}" type="audio/mpeg">
</audio>

<audio id="hintSound">
    <source src="{{ url_for('static', filename='sounds/hint sound.wav') }}" type="audio/wav">
</audio>
    

<script>

let currentWord = "";

// 🔊 PLAY SOUND
function playSound(id){

    let sound = document.getElementById(id);

    if(sound){

        sound.currentTime = 0;

        sound.play().catch(err => console.log(err));

    }

}

// 🟨 PICK LETTER
function pick(letter){

    currentWord += letter;

    document.getElementById("answer").innerHTML = currentWord;

    document.getElementById("wordInput").value = currentWord;

}

// ❌ CLEAR
function clearWord(){

    currentWord = "";

    document.getElementById("answer").innerHTML = "";

    document.getElementById("wordInput").value = "";

}

// ✅ SUBMIT
function submitWord(){

    let word = document.getElementById("wordInput").value;

    fetch("/jumble/check",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            answer:word
        })

    })

    .then(r=>r.json())

    .then(data=>{

        // ✅ CORRECT
        if(data.result=="correct"){

            playSound("correctSound");

            document.getElementById("foundWords").innerHTML +=
            "✅ " + word + "<br>";

            document.getElementById("count").innerHTML =
            data.found.length;

            document.getElementById("coins").innerHTML =
            data.coins;

            clearWord();

        }

        // 🎉 WIN
        else if(data.result=="win"){

            playSound("correctSound");

            document.getElementById("result").innerHTML =

            "<div class='win'>🎉 YOU WON 🎉</div><br>" +

            "<button onclick='nextLevel()'>CHAPTER NEXT ➜</button>";

        }

        // ❌ WRONG
        else if(data.result=="wrong"){

            playSound("wrongSound");

            alert("❌ Wrong Word");

        }

        // 💀 GAME OVER
        else if(data.result=="gameover"){

            playSound("loseSound");

            alert("💀 Better Luck Next Time");

            window.location="/jumble/restart";

        }

    });

}

// 💡 HINT
function getHint(){

    playSound("hintSound");

    fetch("/jumble/hint")

    .then(r=>r.json())

    .then(data=>{

        if(data.hint){

            alert("💡 Hint: " + data.hint);

            document.getElementById("coins").innerHTML =
            data.coins;

        }

        else{

            alert(data.error);

        }

    });

}

// ▶ NEXT LEVEL
function nextLevel(){

    window.location="/jumble";

}

</script>

    <script>

window.onload = function(){

    document.getElementById("submitBtn")
    .addEventListener("click", submitWord);

    document.getElementById("clearBtn")
    .addEventListener("click", clearWord);

    document.getElementById("hintBtn")
    .addEventListener("click", getHint);

}

</script>
</body>
</html>
