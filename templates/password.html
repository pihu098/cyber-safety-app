<!DOCTYPE html>
<html>
<head>
    <title>Password Generator</title>

    <style>
        body {
            font-family: Arial;
            background: #0f2027;
            color: white;
            text-align: center;
            padding-top: 50px;
        }

        .box {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            width: 300px;
            margin: auto;
            border-radius: 15px;
            box-shadow: 0 0 10px #00c6ff;
        }

        input {
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #00c6ff;
            color: white;
            border-radius: 10px;
            cursor: pointer;
        }

        h2 {
            color: #00c6ff;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            color: lightgreen;
        }
    </style>
</head>

<body>

    <h2>🔐 Password Generator</h2>

    <div class="box">

        <form action="/password" method="POST">

            <input type="number" name="length" value="8" min="4" max="32"><br>

            <label><input type="checkbox" name="upper"> Uppercase</label><br>
            <label><input type="checkbox" name="lower"> Lowercase</label><br>
            <label><input type="checkbox" name="digits"> Numbers</label><br>
            <label><input type="checkbox" name="symbols"> Symbols</label><br>

            <button type="submit">Generate</button>

        </form>

        {% if result %}
        <div class="result">
            🔑 {{ result }}
        </div>
        {% endif %}

    </div>

</body>
</html>
