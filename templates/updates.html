<!DOCTYPE html>
<html>
<head>
<title>Updates</title>

<style>
body {
    background: #0f2027;
    color: white;
    font-family: Arial;
    text-align: center;
}

.card {
    background: rgba(255,255,255,0.1);
    margin: 20px auto;
    padding: 20px;
    border-radius: 10px;
    width: 80%;
}

a {
    color: #00c6ff;
    text-decoration: none;
}
button {
    padding: 8px 15px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}
</style>

</head>

<body>

<h2>📢 Cyber Updates</h2>

<a href="/home"><button>⬅ Back</button></a>

{% if updates %}

    {% for u in updates %}

        <div class="card">

            <h3>{{ u[1] }}</h3>
            <p>{{ u[2] }}</p>

            {% if u[3] %}
                <p>
                    <a href="{{ url_for('static', filename='uploads/' + u[3]) }}" target="_blank">
                        📄 View File
                    </a>
                    <br>
                    <a href="{{ url_for('static', filename='uploads/' + u[3]) }}" download>
                        📥 Download
                    </a>
                </p>
            {% endif %}

            <a href="/delete_update/{{ u[0] }}" style="color:red;">🗑 Delete</a>

        </div>

    {% endfor %}

{% else %}

    <p>😢 No updates yet. Check back later!</p>

{% endif %}

</body>
</html>
