<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #0f2027;
    color: white;
    margin: 0;
 background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #000000);
    background-size: 400% 400%;
    animation: bgMove 12s ease infinite;
}   
/* animation */
@keyframes bgMove {
    0% {background-position: 0%}
    50% {background-position: 100%}
    100% {background-position: 0%}
}
<video autoplay muted loop id="bgVideo">
    <source src="/static/videos/cyber.mp4" type="video/mp4">
</video>    
/* TOPBAR */
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    background: rgba(0,0,0,0.3);
    border-bottom: 1px solid #00c6ff;
}

.left {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.center {
    font-size: 20px;
    font-weight: bold;
}

.profile-img {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    border: 2px solid #00c6ff;
    cursor: pointer;
}

.level {
    font-size: 12px;
}

/* MAIN */
.main {
    display: flex;
    padding: 20px;
    gap: 20px;
}

.sidebar {
    width: 220px;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.content {
    flex: 1;
}

/* CARDS */
.card {
    background: rgba(255,255,255,0.1);
    padding: 15px;
    border-radius: 15px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
}

.box {
    text-align: center;
    padding: 20px;
    border-radius: 15px;
    background: rgba(255,255,255,0.1);
    cursor: pointer;
    transition: 0.3s;
}

.box:hover {
    transform: scale(1.08);
    box-shadow: 0 0 15px #00c6ff;
}
.card, .box {
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.08);
}
.icon {
    width: 60px;
    height: 60px;
    background: #00c6ff;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: auto;
    font-size: 28px;
}

/* CHARACTER */
.character {
    position: fixed;
    bottom: 20px;
    right: 20px;
}

.character img {
    width: 70px;
    animation: float 2s infinite;
}

@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0); }
}
#bgVideo {
    position: fixed;
    right: 0;
    bottom: 0;
    min-width: 100%;
    min-height: 100%;
    z-index: -1;
    object-fit: cover;
}
/* CHAT */
.chat {
    margin: 20px;
}

/* FIX: emergency links white */
.sidebar a {
    color: white;
    text-decoration: none;
}
</style>
</head>

<body>

<!-- 🔊 SOUND -->
<audio id="bgMusic" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3">
</audio>

<!-- TOPBAR -->
<div class="topbar">

<div class="left">
<a href="/profile">
<img src="/static/characters/bot.gif" class="profile-img">
</a>
<span class="level">Level {{level}}</span>
</div>

<div class="center">
👋 Welcome {{name}}
</div>

<div class="right">
<a href="/logout"><button>Logout</button></a>
</div>

</div>

<!-- MAIN -->
<div class="main">

<!-- LEFT -->
<div class="sidebar">

<div class="card">
<h3>💡 Tips</h3>
<button onclick="showTips()">Show</button>
<div id="tipsBox"></div>
</div>

<div class="card">
<h3>🚨 Help</h3>
<p><a href="tel:1091">👩 1091</a></p>
<p><a href="tel:1098">🧒 1098</a></p>
<p><a href="tel:100">🚓 100</a></p>
<p><a href="tel:1930">💻 1930</a></p>
</div>

</div>

<!-- RIGHT -->
<div class="content">

<div class="grid">

<a href="/community" class="box"><div class="icon">👥</div><p>Community</p></a>
<a href="/leaderboard" class="box"><div class="icon">🏆</div><p>Leaders</p></a>
<a href="/game/puzzle/start" class="box"><div class="icon">🧩</div><p>Puzzle</p></a>

<a href="/password" class="box"><div class="icon">🔐</div><p>Password</p></a>
<a href="/check" class="box"><div class="icon">🌐</div><p>Website</p></a>
<a href="/check_email" class="box"><div class="icon">📧</div><p>Email</p></a>

<a href="/scan_file" class="box"><div class="icon">📁</div><p>Scanner</p></a>
<a href="/quiz" class="box"><div class="icon">🎯</div><p>Quiz</p></a>
<a href="/updates" class="box"><div class="icon">📢</div><p>Updates</p></a>

<!-- STREAK -->
<div class="box">
<div class="icon">🔥</div>
<p>{{streak}} days</p>
</div>

<!-- STATS -->
<div class="box">
<div class="icon">📊</div>
<p>Level {{level}}</p>
<p>XP {{xp}}</p>
</div>

</div>

</div>
</div>

<!-- 🤖 CHARACTER -->
<div class="character" id="character">
<img src="https://media.giphy.com/media/3o7aD2saalBwwftBIY/giphy.gif" id="charImg">
</div>

<!-- 🤖 CHAT -->
<div class="chat">
<h3>🤖 AI Chatbot</h3>
<input id="msg" placeholder="Ask something...">
<button onclick="sendMsg()">Send</button>
<p id="reply"></p>
</div>

<!-- ADMIN -->
<div class="card" style="margin:20px;">
<h3>📄 Admin Panel</h3>
<a href="/admin">Open</a>
</div>

<script>
// 🎧 SOUND
function startMusic(){
let audio = document.getElementById("bgMusic");
audio.volume = 0.05;
audio.play().catch(()=>{});
}

window.onload = function(){
startMusic();
showTips();

// 🎤 welcome voice
if(!localStorage.getItem("welcomed")){
let msg = new SpeechSynthesisUtterance("Welcome to Cyber Safety Guard");
msg.volume = 0.3;
speechSynthesis.speak(msg);
localStorage.setItem("welcomed","yes");
}
};

document.addEventListener("click", startMusic, {once:true});

// 🤖 CHARACTER SAFE LOAD
document.addEventListener("DOMContentLoaded", function(){
let char = document.getElementById("character");
if(char){
char.onclick = function(){
let img = document.getElementById("charImg");
img.style.transform = "scale(1.3)";
setTimeout(()=>{img.style.transform="scale(1)"},200);
};
}
});

// 💡 TIPS
function showTips(){
fetch('/get_tip')
.then(res=>res.json())
.then(data=>{
let html="";
data.tips.forEach(t=> html+="👉 "+t+"<br>");
document.getElementById("tipsBox").innerHTML=html;
});
}
document.querySelectorAll(".box").forEach(box=>{
    box.addEventListener("mouseenter", ()=>{
        let sound = new Audio("https://www.soundjay.com/buttons/sounds/button-09.mp3");
        sound.volume = 0.2;
        sound.play();
    });
});
 document.getElementById("character").onclick = function(){

    let msg = new SpeechSynthesisUtterance("Hey! Stay safe online!");
    msg.volume = 0.5;
    speechSynthesis.speak(msg);

}   

// 🤖 CHAT
async function sendMsg(){
let msg=document.getElementById("msg").value;
let res=await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:"message="+encodeURIComponent(msg)
});
document.getElementById("reply").innerText=await res.text();
}
</script>

</body>
</html>
