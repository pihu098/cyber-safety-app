<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #0f2027;
    color: white;
    text-align: center;
}

/* HEADER */
.header { margin-top: 20px; }

.logout {
    position: absolute;
    top: 20px;
    right: 20px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    margin: 20px;
}

.card {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 15px;
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.08);
    box-shadow: 0 0 15px #00c6ff;
}

.icon {
    width: 60px;
    height: 60px;
    background: #00c6ff;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: auto;
    font-size: 28px;
}
.card p {
    margin-top: 10px;
    font-size: 14px;
}
.character {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 999;
}

.character img {
    width: 70px;
    height: 70px;
    animation: float 2s infinite ease-in-out;
}

@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0); }
}    

</style>
</head>

<body>

<!-- 🔊 SOUND -->
<audio id="bgMusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3">
</audio>

<div class="logout">
<a href="/logout"><button>Logout</button></a>
</div>

<div class="header">
<h2>Welcome {{name}} 👋</h2>
<h3>Cyber Safety Dashboard</h3>
</div>

<!-- 🔥 GRID FEATURES -->
<div class="grid">

<a href="/community" class="card">
<div class="icon">👥</div>
<p>Community</p>
</a>

<a href="/leaderboard" class="card">
<div class="icon">🏆</div>
<p>Leaders</p>
</a>

<a href="/game/puzzle/start" class="card">
<div class="icon">🧩</div>
<p>Puzzle</p>
</a>

<a href="/password" class="card">
<div class="icon">🔐</div>
<p>Password</p>
</a>

<a href="/check" class="card">
<div class="icon">🌐</div>
<p>Website</p>
</a>

<a href="/check_email" class="card">
<div class="icon">📧</div>
<p>Email</p>
</a>

<a href="/quiz" class="card">
<div class="icon">🎯</div>
<p>Quiz</p>
</a>

<a href="/updates" class="card">
<div class="icon">📢</div>
<p>Updates</p>
</a>

</div>

<!-- 🤖 CHARACTER -->
<div class="character" id="character">
    <img src="/static/characters/bot.gif" id="charImg">
</div>
    
<!-- 💡 TIPS -->
<div id="tipsBox"></div>

<!-- 🤖 CHAT -->
<h3>AI Chatbot</h3>
<input id="msg" placeholder="Ask...">
<button onclick="sendMsg()">Send</button>
<p id="reply"></p>

<script>
async function sendMsg(){
    let msg = document.getElementById("msg").value;
    let res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type":"application/x-www-form-urlencoded"},
        body: "message="+encodeURIComponent(msg)
    });
    document.getElementById("reply").innerText = await res.text();
}
</script>

<!-- 🔥 ALL LOGIC (CLEAN) -->
<script>

// 🎧 SOUND
function startMusic(){
    let audio = document.getElementById("bgMusic");
    audio.volume = 0.05;
    audio.play().catch(()=>{});
}

window.onload = function(){
    startMusic();
    showTips();

    // character load
    let saved = localStorage.getItem("character");
    if(saved){
        document.getElementById("character").innerHTML = saved;
    }

    // welcome voice once
    if(!localStorage.getItem("welcomed")){
        let msg = new SpeechSynthesisUtterance(
        "Welcome to Cyber Safety Guard");
        msg.volume = 0.3;
        speechSynthesis.speak(msg);
        localStorage.setItem("welcomed","yes");
    }
};

// fallback click
document.addEventListener("click", startMusic, {once:true});

// 🤖 character click
document.getElementById("character").onclick = function(){
    let img = document.getElementById("charImg");

    img.style.transform = "scale(1.3)";
    setTimeout(()=>{
        img.style.transform = "scale(1)";
    }, 200);
}

// 💡 tips
function showTips(){
    fetch('/get_tip')
    .then(r=>r.json())
    .then(data=>{
        let html="";
        data.tips.forEach(t=> html+="👉 "+t+"<br>");
        document.getElementById("tipsBox").innerHTML=html;
    });
}

</script>

</body>
</html>
