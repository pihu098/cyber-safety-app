<!DOCTYPE html>
<html>
<head>
<title>Signup</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(-45deg, #141e30, #243b55, #000000);
    background-size: 400% 400%;
    animation: gradient 10s ease infinite;
    color: white;
    text-align: center;
}

@keyframes gradient {
    0% {background-position: 0%}
    50% {background-position: 100%}
    100% {background-position: 0%}
}

.container {
    margin-top: 100px;
    background: rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 15px;
    display: inline-block;
    backdrop-filter: blur(10px);
}

input {
    padding: 10px;
    margin: 10px;
    border-radius: 8px;
    border: none;
    width: 80%;
}

button {
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    background: #00c6ff;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
    background: #0072ff;
}

a {
    color: #00c6ff;
    text-decoration: none;
}
</style>
</head>

<body>

<!-- 🔊 SOUND -->
<audio id="clickSound">
    <source src="/static/uploads/sounds/ribhavagrawal-a-savage-hackerbass-boosted-199368.mp3" type="audio/mpeg">
</audio>

<div class="container">
<h2>📝 Create Account</h2>

<!-- 🔥 SINGLE FORM ONLY -->
<form method="POST" action="/signup" onsubmit="return handleSignup()">

<input name="name" placeholder="Name" required><br>
<input type="email" name="email" placeholder="Email" required><br>
<input type="password" name="password" placeholder="Password" required><br>

<button type="submit">Create Account</button>

</form>

<p>Already have an account?</p>
<a href="/">
<button type="button">Login</button>
</a>

</div>

<script>
function handleSignup(){

    // 🎤 voice
    let msg = new SpeechSynthesisUtterance("Welcome to Cyber Safety Guard");
    msg.volume = 0.3;
    speechSynthesis.speak(msg);

    // 🔊 sound
    let audio = document.getElementById("clickSound");
    audio.volume = 0.2;
    audio.play();

    // ⏳ delay
    setTimeout(()=>{
        document.querySelector("form").submit();
    }, 800);

    return false;
}
</script>

</body>
</html>
