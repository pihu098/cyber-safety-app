<!DOCTYPE html>
<html>
<head>
<title>Welcome</title>

<style>
body {
    background: black;
    color: #00c6ff;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
    text-align: center;
}

h1 {
    font-size: 28px;
    animation: glow 1.5s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #00c6ff; }
    to { text-shadow: 0 0 25px #00c6ff; }
}
</style>

</head>

<body>

<h1>🛡️ Welcome {{name}}</h1>
<p>Loading your Cyber Safety Dashboard...</p>

<script>

// 🎤 VOICE (login ke baad hi chalega)
let msg = new SpeechSynthesisUtterance(
    "Welcome to Cyber Safety Guard. Stay safe and keep learning."
);

msg.rate = 1;
msg.pitch = 1;
msg.volume = 1;

speechSynthesis.speak(msg);

// ⏳ 3 sec baad dashboard open
setTimeout(() => {
    window.location.href = "/home";
}, 3000);

</script>

</body>
</html>
