<!DOCTYPE html>
<html>
<head>
<title>Welcome</title>

<style>
body {
    background: black;
    color: #00c6ff;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
    text-align: center;
}

h1 {
    font-size: 28px;
    animation: glow 1.5s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #00c6ff; }
    to { text-shadow: 0 0 25px #00c6ff; }
}
</style>

</head>

<body>

<!-- 🔊 SOUND -->
<audio id="bgSound" loop>
    <source src="/static/sounds/bg.mp3" type="audio/mpeg">
</audio>

<h1>🛡️ Welcome {{name}}</h1>
<p>Tap anywhere to continue...</p>

<!-- 🔥 START BUTTON (SAFE METHOD) -->
<button onclick="startApp()" style="
    margin-top:20px;
    padding:10px 20px;
    background:#00c6ff;
    border:none;
    border-radius:10px;
    color:white;
    cursor:pointer;
">
Start 🚀
</button>

<script>
function startApp(){

    let audio = document.getElementById("bgSound");

    audio.volume = 0.1;
    audio.play().catch(e => console.log("Blocked:", e));

    // 🔥 smooth delay then redirect
    setTimeout(()=>{
        window.location.href = "/home";
    }, 10000);
}
</script>

</body>
</html>
